# Site settings
title: ON4OSA
# Full <title> of the homepage.
tagline: ON4OSA – Radioamateurclub in Antwerpen | UBA-sectie OSA
# Appended to subpage titles so every page states what the club is (SEO).
title_suffix: ON4OSA – Radioamateurclub Antwerpen
# Meta description (kept under ~160 characters, Google's truncation limit).
description: >-
  ON4OSA is een radioamateurclub in Antwerpen en sectie OSA van de UBA.
  Ontdek onze bijeenkomsten, voordrachten, velddagen en activiteiten voor
  zendamateurs.
email: info@on4osa.be
baseurl: ""
# Canonical site URL (matches CNAME) — used for absolute URLs in sitemap.xml
# and the canonical/Open Graph tags from jekyll-seo-tag.
url: "https://on4osa.be"
# Locale used by jekyll-seo-tag (og:locale).
lang: nl_BE
author: ON4OSA

# Default social share image (og:image / twitter:image) for every page.
# Override per page with `image:` in its front matter.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/westhinder.jpg

# Optional jekyll-seo-tag fields — fill in if/when you have them:
# logo: /assets/img/logo.png          # used as the organisation logo in JSON-LD
# twitter:
#   username: ON4OSA
#   card: summary_large_image
# facebook:
#   publisher: https://www.facebook.com/...
# social:
#   name: ON4OSA
#   links:
#     - https://www.facebook.com/...
# google_site_verification: ...

# Build settings
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Navigation shown in the navbar
nav_links:
  - title: Home
    url: /
  - title: OSA Nieuws
    url: /#osa-nieuws
  - title: Velddagen
    url: /velddagen/
  - title: Over ons
    url: /about/

# Silence Sass deprecation warnings coming from dependencies (e.g. the
# deprecated lighten()/darken() color functions used by older gems).
sass:
  quiet_deps: true
  style: compressed
  silence_deprecations:
    - color-functions
    - global-builtin
    - import

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - CLAUDE.md
