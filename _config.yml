# Site settings
title: ON4OSA
tagline: UBA sectie OSA - Een Antwerpse UBA sectie
description: >-
  ON4OSA is een Antwerpse sectie (OSA) van de UBA, de Koninklijke Unie van
  de Belgische Zendamateurs. Ontdek onze bijeenkomsten, activiteiten en de
  wereld van de radioamateur.
email: info@on4osa.be
baseurl: ""
url: ""

# Navigation shown in the navbar
nav_links:
  - title: Home
    url: /
  - title: OSA Nieuws
    url: /#osa-nieuws
  - title: Velddagen
    url: /velddagen/
  - title: Over ons
    url: /about/

# Silence Sass deprecation warnings coming from dependencies (e.g. the
# deprecated lighten()/darken() color functions used by older gems).
sass:
  quiet_deps: true
  style: compressed
  silence_deprecations:
    - color-functions
    - global-builtin
    - import

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - CLAUDE.md
